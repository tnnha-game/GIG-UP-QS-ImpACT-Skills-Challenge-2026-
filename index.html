<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Cố định nền đen và căn giữa tuyệt đối */
      body { 
        padding: 0; margin: 0; background-color: #000; 
        display: flex; justify-content: center; align-items: center; 
        height: 100vh; width: 100vw; overflow: hidden; 
      }
      /* Container này giúp game luôn giữ tỷ lệ 16:9 và không bao giờ tràn màn hình */
      #unity-container {
        width: 100%;
        height: 100%;
        max-width: 177.78vh; /* Tỷ lệ 16:9 (1920/1080) */
        max-height: 56.25vw;
        aspect-ratio: 16 / 9;
        display: flex;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      /* Canvas tự động lấp đầy container nhưng không vượt quá kích thước thiết kế */
      #unity-canvas { 
        width: 100% !important; 
        height: 100% !important; 
        background: #231F20;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
    </div>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      });
    </script>
  </body>
</html>
