<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Strategy Simulation</title>
    <style>
      html, body {
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }
      #unity-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
      #unity-canvas { max-width: 100%; max-height: 100%; aspect-ratio: 16 / 9; object-fit: contain; }
      
      /* Hiệu ứng chữ Loading */
      #loading-text {
        position: absolute; color: white; font-family: sans-serif;
        font-size: 1.2rem; letter-spacing: 2px; animate: blink 1.5s infinite;
      }
      @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING GIG-UP ASSETS...</div>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none"; // Load xong thì ẩn chữ đi
      }).catch((message) => {
        alert("Lỗi rồi Hà ơi: " + message);
      });
    </script>
  </body>
</html>
