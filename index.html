<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Triệt tiêu viền xanh và reset mặc định */
      * {
        outline: none !important;
        -webkit-tap-highlight-color: rgba(0,0,0,0);
      }

      html, body {
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }

      #unity-container { 
        width: 100vw !important; 
        height: 100vh !important; 
        display: flex !important; 
        justify-content: center !important; 
        align-items: center !important; 
        position: relative;
        background-color: #000;
      }
      
      /* Canvas: TỰ ĐỘNG CÂN BẰNG - KHÔNG LỆCH HÌNH */
      #unity-canvas { 
        /* Rộng hết cỡ ngang */
        width: 100% !important; 
        /* Cao tự nhảy theo tỉ lệ 16:9 nhưng không vượt quá màn hình */
        height: auto !important;
        max-width: 100% !important;
        max-height: 100% !important;
        
        aspect-ratio: 16 / 9 !important; 
        object-fit: contain !important; 
        z-index: 1;
        border: none !important;
      }
      
      #loading-text {
        position: absolute; 
        color: #ffffff; 
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px; 
        letter-spacing: 5px; 
        animation: blink 2s infinite;
        z-index: 999; 
        pointer-events: none;
        text-transform: uppercase;
      }

      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none"; 
        canvas.style.outline = "none";
      }).catch((err) => {
        console.error(err);
      });
    </script>
  </body>
</html>
