<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* 1. PHONG ẤN VIỀN XANH CẤP ĐỘ HỆ THỐNG */
      * {
        outline: none !important;
        box-shadow: none !important;
        -webkit-tap-highlight-color: transparent !important;
        -webkit-user-select: none;
        user-select: none;
      }

      html, body {
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }

      #unity-container { 
        width: 100vw; height: 100vh; 
        position: relative; 
        display: flex; justify-content: center; align-items: center;
        background-color: #000;
      }

      /* 2. CĂN GIỮA TUYỆT ĐỐI & CHỐNG LỆCH */
      #unity-canvas { 
        width: 98vw !important; 
        height: auto !important;
        max-height: 98vh !important;
        aspect-ratio: 16 / 9; 
        object-fit: contain; 
        background: #231f20;
        
        /* Chặn mọi loại border/outline có thể có */
        border: none !important;
        outline: none !important;
        outline: 0 !important;
      }

      /* CHẶN VIỀN XANH KHI CLICK/ACTIVE TRÊN CHROME & SAFARI */
      #unity-canvas:focus, 
      #unity-canvas:active, 
      #unity-canvas:focus-visible,
      canvas:focus {
        outline: none !important;
        outline: 0 !important;
        box-shadow: none !important;
        border: none !important;
      }
      
      #loading-text {
        position: absolute; color: #ffffff; 
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 14px; letter-spacing: 4px; 
        animation: blink 2s infinite;
        z-index: 10; pointer-events: none;
      }
      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none";
        // Đảm bảo không có tiêu điểm vào canvas sau khi load
        canvas.blur();
        window.focus();
      }).catch((message) => {
        console.error(message);
      });

      // 3. CHIÊU CUỐI: CHẶN HÀNH VI FOCUS MẶC ĐỊNH KHI CLICK
      canvas.addEventListener('mousedown', function(e) {
        e.preventDefault(); // Ngăn trình duyệt đánh dấu focus ring
        window.focus();
        canvas.blur();
      }, false);

      // Chặn luôn cho cảm ứng điện thoại
      canvas.addEventListener('touchstart', function(e) {
        canvas.blur();
      }, {passive: true});
    </script>
  </body>
</html>
