<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Ép nền đen hoàn toàn và triệt tiêu mọi khoảng trắng */
      body { padding: 0; margin: 0; background: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; }
      
      /* Tạo một cái khung "vàng" đúng tỷ lệ Unity */
      #unity-container { 
        position: relative; 
        width: 100%; 
        height: 100%; 
        max-width: 177.78vh; /* Đây là tỷ lệ 16:9 */
        max-height: 56.25vw; 
        aspect-ratio: 16 / 9;
        box-shadow: 0 0 50px rgba(0,0,0,1);
      }

      #unity-canvas { 
        width: 100% !important; 
        height: 100% !important; 
        background: #000; 
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
    </div>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      });
    </script>
  </body>
</html>
