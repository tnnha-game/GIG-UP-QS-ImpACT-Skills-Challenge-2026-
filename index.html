<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title> 
    <style>
      html, body {
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }
      #unity-container { 
        width: 100vw !important; 
        height: 100vh !important; 
        display: flex !important; 
        justify-content: center !important; 
        align-items: center !important; 
        position: relative; 
      }
      
      #unity-canvas { 
        /* Ép chiều ngang 100vw để tràn viền 2 bên theo ý Hà */
        width: 100vw !important; 
        height: auto !important;
        aspect-ratio: 16 / 9 !important; 
        object-fit: contain !important; 
        background: #231f20;
      }
      
      /* Chữ LOADING... nhấp nháy giữa màn hình */
      #loading-text {
        position: absolute; 
        color: #ffffff; 
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px; 
        letter-spacing: 5px; 
        animation: blink 2s infinite;
        z-index: 10;
        text-transform: uppercase;
      }
      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        // Khi game hiện ra thì chữ LOADING biến mất
        loadingText.style.display = "none"; 
      }).catch((message) => {
        console.error(message);
      });
    </script>
  </body>
</html>
