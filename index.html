<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Cố định nền đen và căn giữa tuyệt đối */
      body { 
        padding: 0; margin: 0; background-color: black; 
        display: flex; justify-content: center; align-items: center; 
        height: 100vh; width: 100vw; overflow: hidden; 
      }
      /* Ép Canvas về đúng kích thước Hà thiết kế trong Unity */
      #unity-canvas { 
        width: 1920px !important; 
        height: 1080px !important; 
        /* Nếu màn hình nhỏ hơn 1920x1080, nó sẽ tự co lại nhưng không làm lệch UI */
        max-width: 100%; 
        max-height: 100%;
        object-fit: contain; 
        background: black;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      });
    </script>
  </body>
</html>
