<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Strategy Simulation</title>
    <style>
      /* Căn giữa tuyệt đối và khóa cuộn */
      body { 
        padding: 0; 
        margin: 0; 
        background-color: #231F20; 
        width: 100vw;
        height: 100vh;
        overflow: hidden; 
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Khung chứa game */
      #unity-container { 
        width: 100%; 
        height: 100%; 
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Canvas tự co giãn theo tỉ lệ 16:9 */
      #unity-canvas { 
        width: 100% !important; 
        height: 100% !important; 
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 16 / 9; 
        object-fit: contain;
        background: #231F20;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        // Thành công!
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
