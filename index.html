<style>
  /* Căn giữa tuyệt đối và khóa scroll */
  html, body {
    margin: 0 !important; padding: 0 !important;
    width: 100% !important; height: 100% !important;
    background-color: #000 !important;
    overflow: hidden !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }

  /* Container bao quanh game */
  #unity-container { 
    width: 100vw !important; 
    height: 100vh !important; 
    display: flex !important; 
    justify-content: center !important; 
    align-items: center !important; 
    position: relative; 
  }
  
  /* Canvas game - BẢN THU NHỎ "PERFECT FIT" */
  #unity-canvas { 
    /* Giảm chiều rộng tối đa xuống còn 92vw để tạo khoảng trống 2 bên */
    width: 92vw !important; 
    
    /* QUAN TRỌNG: Giới hạn chiều cao nghiêm ngặt hơn (92vh) */
    /* để ép game co lại trên màn hình Macbook */
    height: auto !important;
    max-height: 92vh !important; 

    /* Giữ tỉ lệ chuẩn để không bị méo */
    aspect-ratio: 16 / 9 !important; 
    object-fit: contain !important; 
    background: #231f20;
    
    /* Thêm chút hiệu ứng nổi khối cho xịn */
    box-shadow: 0 0 30px rgba(0,0,0,0.5); 
  }
  
  /* Chữ LOADING... tối giản */
  #loading-text {
    position: absolute; 
    color: #ffffff; 
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px; 
    letter-spacing: 4px; 
    animation: blink 2s infinite;
    z-index: 10;
  }
  @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
</style>
