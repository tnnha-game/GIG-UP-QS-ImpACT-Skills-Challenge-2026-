<style>
  html, body {
    margin: 0 !important; padding: 0 !important;
    width: 100% !important; height: 100% !important;
    background-color: #000 !important;
    overflow: hidden !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }
  #unity-container { 
    width: 100vw !important; 
    height: 100vh !important; 
    display: flex !important; 
    justify-content: center !important; 
    align-items: center !important; 
  }
  
  /* ĐOẠN CODE QUYẾT ĐỊNH RỘNG MÀN HÌNH */
  #unity-canvas { 
    /* Ép chiều ngang ra sát mép hơn - Hà có thể tăng số 95 lên 100 nếu muốn tràn viền */
    width: 95vw !important; 
    height: auto !important;
    
    /* Duy trì tỉ lệ khung hình để không bị méo nhân vật quá nhiều */
    aspect-ratio: 16 / 9 !important; 
    
    /* Ép kiểu hiển thị */
    object-fit: contain !important; 
    background: #231f20;
  }
  
  #loading-text {
    position: absolute; 
    color: #ffffff; 
    font-family: sans-serif;
    font-size: 14px; 
    letter-spacing: 4px; 
    animation: blink 2s infinite;
    z-index: 10;
  }
  @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
</style>
