<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Reset mặc định của trình duyệt */
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important; /* Chặn thanh cuộn */
        
        /* CĂN GIỮA TUYỆT ĐỐI THEO CẢ 2 CHIỀU */
        display: flex !important;
        justify-content: center !important; /* Căn giữa ngang */
        align-items: center !important;     /* Căn giữa dọc */
      }

      #unity-container { 
        /* Chiếm tối đa không gian có thể của trình duyệt */
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        position: relative; 
      }

      #unity-canvas { 
        /* CHIÊU CUỐI ĐỂ TO HẾT CỠ MÀ KHÔNG LỆCH */
        
        /* 1. Ép chiều rộng chiếm 98% màn hình, chừa 1% biên an toàn */
        width: 98vw !important; 
        
        /* 2. Chiều cao tự nhảy theo tỉ lệ 16:9 của Unity */
        height: auto !important; 
        
        /* 3. KHÓA TỈ LỆ: Đảm bảo Alex không bị méo hình */
        aspect-ratio: 16 / 9 !important; 
        
        /* 4. CHỐNG TRÀN DỌC: Nếu màn hình quá lùn, game tự co lại */
        max-height: 98vh !important; 
        
        /* 5. CĂN GIỮA NỘI DUNG: Giúp hình ảnh bên trong canvas đẹp nhất */
        object-fit: contain !important; 

        background: #231f20;
        /* Triệt tiêu viền xanh khi click trên Mac */
        outline: none !important;
        border: none !important;
      }
      
      #loading-text {
        position: absolute; 
        color: #ffffff; 
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 14px; 
        letter-spacing: 4px; 
        animation: blink 2s infinite;
        z-index: 10;
        pointer-events: none; /* Không cản click chuột */
      }
      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none";
        // Khóa focus sau khi load xong
        canvas.blur();
      }).catch((message) => {
        console.error(message);
      });

      // Lệnh chặn viền xanh khi click chơi game
      canvas.addEventListener('mousedown', function() {
        setTimeout(function() { window.focus(); canvas.blur(); }, 10);
      });
    </script>
  </body>
</html>
