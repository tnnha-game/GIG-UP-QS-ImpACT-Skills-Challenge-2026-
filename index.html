<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      body { 
        padding: 0; margin: 0; background-color: black; 
        display: flex; justify-content: center; align-items: center; 
        height: 100vh; width: 100vw; overflow: hidden; 
      }
      #unity-container {
        position: relative;
        /* Đây là "chiêu" quyết định: Khóa cứng tỷ lệ cửa sổ chơi game */
        width: 1920px; 
        height: 1080px;
        transform-origin: center;
      }
      #unity-canvas { 
        width: 100% !important; 
        height: 100% !important;
        background: black;
      }
    </style>
    <script>
      // Hàm này giúp game tự co giãn theo màn hình người xem mà không làm lệch UI
      function resize() {
        var container = document.querySelector("#unity-container");
        var scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        container.style.transform = "scale(" + scale + ")";
      }
      window.addEventListener('resize', resize);
      window.addEventListener('load', resize);
    </script>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
    </div>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then(() => { resize(); });
    </script>
  </body>
</html>
