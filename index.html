<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Ép toàn bộ trang web màu đen và không có thanh cuộn */
      body { padding: 0; margin: 0; background: black; overflow: hidden; }
      #unity-canvas { 
        width: 100vw !important; 
        height: 100vh !important; 
        background: black; 
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Cấu hình để game luôn full màn hình trình duyệt
      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        // Thành công!
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
