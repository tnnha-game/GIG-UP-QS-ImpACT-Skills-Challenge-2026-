<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* CHIÊU CUỐI: TRIỆT TIÊU TOÀN BỘ OUTLINE TRÊN MỌI THẺ */
      * {
        outline: none !important;
        -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        box-shadow: none !important;
      }

      html, body {
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: 100% !important;
        background-color: #000 !important;
        overflow: hidden !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }

      #unity-container { 
        width: 100vw !important; 
        height: 100vh !important; 
        display: flex !important; 
        justify-content: center !important; 
        align-items: center !important; 
        position: relative;
        background: #000 !important;
      }
      
      /* Canvas: Full nhưng không bao giờ có viền */
      #unity-canvas { 
        width: 100% !important; 
        height: auto !important;
        max-width: 100% !important;
        max-height: 100% !important;
        aspect-ratio: 16 / 9 !important; 
        object-fit: contain !important; 
        z-index: 1;
        
        /* Chặn mọi loại viền có thể xuất hiện */
        border: none !important;
        outline: 0 !important;
      }

      /* Chữ LOADING... */
      #loading-text {
        position: absolute; 
        color: #ffffff; 
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px; 
        letter-spacing: 5px; 
        animation: blink 2s infinite;
        z-index: 999; 
        pointer-events: none;
      }

      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none";
        // Ép thêm một lần nữa bằng JS sau khi load xong
        canvas.blur(); 
      }).catch((err) => {
        console.error(err);
      });

      // Lệnh chặn focus gây viền xanh khi click
      canvas.addEventListener('mousedown', function(e) { e.preventDefault(); }, false);
    </script>
  </body>
</html>
