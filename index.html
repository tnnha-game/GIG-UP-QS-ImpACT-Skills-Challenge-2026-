<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* Nền đen toàn trang và căn giữa game */
      body { 
        padding: 0; 
        margin: 0; 
        background-color: black; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        overflow: hidden; 
      }
      #unity-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
      #unity-canvas { 
        /* Giữ tỷ lệ 16:9 và không cho tràn quá sát mép màn hình */
        width: 95vw !important; 
        height: 53.43vw !important; /* Tỷ lệ 16:9 so với chiều rộng */
        max-height: 95vh !important;
        max-width: 168.88vh !important; /* Đảm bảo không bị quá to trên màn hình ngang */
        background: black; 
        box-shadow: 0px 0px 20px rgba(0,0,0,0.5); /* Tạo chiều sâu nhẹ */
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script src="Build/GIG_UP_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/GIG_UP_Build.data",
        frameworkUrl: "Build/GIG_UP_Build.framework.js",
        codeUrl: "Build/GIG_UP_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vinexus",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
