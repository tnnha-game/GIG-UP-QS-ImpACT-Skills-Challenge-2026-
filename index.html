<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>GIG-UP | Vinexus</title>
    <style>
      /* 1. TRIỆT TIÊU VIỀN XANH TRÊN MỌI TRÌNH DUYỆT */
      * {
        outline: none !important;
        box-shadow: none !important;
        -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
      }

      html, body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background-color: #000 !important;
        /* CĂN GIỮA TUYỆT ĐỐI */
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        overflow: hidden !important;
      }

      #unity-container { 
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        position: relative; 
      }

      #unity-canvas { 
        /* TỐI ƯU HIỂN THỊ LINH HOẠT THEO SIZE MÀN HÌNH */
        max-width: 98%; 
        max-height: 98%; 
        aspect-ratio: 16 / 9; 
        object-fit: contain; 
        background: #231f20;
        border: none !important;
        cursor: pointer;
      }

      /* CHẶN VIỀN XANH KHI CLICK/FOCUS TRÊN MAC & CHROME */
      #unity-canvas:focus, #unity-canvas:active, #unity-canvas:focus-visible {
        outline: none !important;
        box-shadow: none !important;
      }
      
      #loading-text {
        position: absolute; 
        color: #ffffff; 
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 14px; 
        letter-spacing: 4px; 
        animation: blink 2s infinite;
        z-index: 10;
        pointer-events: none;
      }
      @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.8; } 100% { opacity: 0.1; } }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="loading-text">LOADING...</div>
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/GIG_UP_Vinexus_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        dataUrl: "Build/GIG_UP_Vinexus_Build.data",
        frameworkUrl: "Build/GIG_UP_Vinexus_Build.framework.js",
        codeUrl: "Build/GIG_UP_Vinexus_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VinUniversity",
        productName: "GIG-UP",
        productVersion: "1.0",
      }).then((unityInstance) => {
        loadingText.style.display = "none";
        // Gỡ focus ngay khi game load xong
        canvas.blur();
        window.focus();
      }).catch((message) => {
        console.error(message);
      });

      /* TRICK CUỐI: CHẶN VIỀN XANH KHI CLICK CHUỘT */
      canvas.addEventListener('mousedown', function(e) { 
        // Ép trình duyệt không focus vào canvas để không hiện viền
        setTimeout(function() { 
          window.focus(); 
          canvas.blur(); 
        }, 10);
      }, false);
      
      // Chặn menu chuột phải cho chuyên nghiệp
      canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);
    </script>
  </body>
</html>
